<style>
  :root {
    --cream: #f5ecd2;
    --cream-2: #f0e3bd;
    --cream-3: #e6d8a8;
    --asphalt: #14140f;
    --asphalt-2: #1f1e16;
    --asphalt-3: #2a2820;
    --asphalt-4: #3a3528;
    --sign-yellow: #ffcc00;
    --sign-amber: #ff9d00;
    --signal-red: #e23a2e;
    --signal-green: #2ec866;
    --sky: #6fb3e0;
    --ink: #14140f;
    --muted: #6a624a;
    --line: #d8c98f;
    --line-white: #f6f1de;

    /* Per-level accent (overridden via body.level-X) */
    --accent: #ffcc00;
    --accent-ink: #14140f;
  }
  body.level-L { --accent: #6fb3e0; --accent-ink: #14140f; }
  body.level-C { --accent: #e23a2e; --accent-ink: #f5ecd2; }
  body.level-A { --accent: #ffcc00; --accent-ink: #14140f; }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--asphalt);
    color: var(--cream);
    font-family: "Space Grotesk", system-ui, sans-serif;
    height: 100vh; overflow: hidden;
  }
  body {
    display: grid;
    grid-template-rows: 6px 64px 1fr 200px;
    height: 100vh;
  }
  .mono { font-family: "JetBrains Mono", monospace; }

  /* Top accent strip — level signature */
  .level-strip { background: var(--accent); }

  /* ============ TOP BAR ============ */
  .topbar {
    background: var(--asphalt-2);
    border-bottom: 3px solid var(--ink);
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 20px;
    color: var(--cream);
  }
  .back {
    display: flex; align-items: center; gap: 10px;
    height: 40px; padding: 0 14px;
    background: transparent; border: 2px solid var(--cream-3);
    color: var(--cream);
    font-family: "Bungee"; font-size: 11px;
    text-decoration: none;
    cursor: pointer;
  }
  .back:hover { background: var(--asphalt-3); }

  .lesson-title { font-family: "Bungee"; font-size: 14px; line-height: 1.1; max-width: 360px; }
  .lesson-title small { display: block; font-family: "JetBrains Mono"; font-size: 9px; color: var(--cream-3); font-weight: 400; margin-top: 4px; letter-spacing: 0.04em; }

  /* Level switcher */
  .level-switch {
    display: flex; gap: 0;
    border: 2px solid var(--asphalt-4);
    height: 40px;
  }
  .level-switch button {
    background: var(--asphalt);
    color: var(--cream-2);
    border: 0; border-right: 2px solid var(--asphalt-4);
    padding: 0 14px;
    font-family: "Bungee"; font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .level-switch button:last-child { border-right: 0; }
  .level-switch button:hover { background: var(--asphalt-3); }
  .level-switch button.active { background: var(--accent); color: var(--accent-ink); }
  .level-switch button .badge {
    width: 18px; height: 18px;
    border: 2px solid currentColor;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: "Bungee"; font-size: 10px;
  }
  .level-switch button.active .badge { border-color: currentColor; }

  .top-progress {
    flex: 1; max-width: 240px;
    display: flex; align-items: center; gap: 12px;
    font-family: "JetBrains Mono"; font-size: 11px;
  }
  .top-progress .bar { flex: 1; height: 10px; background: var(--asphalt-3); border: 2px solid var(--cream-3); position: relative; }
  .top-progress .bar i { display: block; height: 100%; background: var(--accent); width: 24%; transition: width .3s; }

  .top-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .pill {
    height: 36px; display: inline-flex; align-items: center; gap: 8px;
    padding: 0 12px; border: 2px solid var(--asphalt-4);
    background: var(--asphalt); color: var(--cream-2);
    font-family: "JetBrains Mono"; font-size: 11px;
  }
  .pill b { font-family: "Bungee"; font-size: 11px; color: var(--accent); }
  .pill .live { width: 8px; height: 8px; border-radius: 50%; background: var(--signal-green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .icon-btn {
    width: 40px; height: 40px;
    border: 2px solid var(--asphalt-4); background: var(--asphalt);
    color: var(--cream-2); cursor: pointer;
    display: grid; place-items: center;
  }
  .icon-btn:hover { background: var(--asphalt-3); border-color: var(--cream-3); }

  /* ============ STAGE LAYOUT ============ */
  .stage {
    display: grid;
    grid-template-columns: 260px 1fr 340px;
    overflow: hidden;
    min-height: 0;
  }

  /* ============ LEFT RAIL — CHAPTERS ============ */
  .chap-rail {
    background: var(--asphalt-2);
    border-right: 3px solid var(--ink);
    overflow-y: auto;
    padding: 20px 16px;
  }
  .chap-rail h4 {
    font-family: "Bungee"; font-size: 11px;
    color: var(--accent);
    margin: 0 0 14px;
    letter-spacing: 0.06em;
  }
  .chap-rail .level-tag {
    display: inline-block;
    background: var(--accent); color: var(--accent-ink);
    font-family: "Bungee"; font-size: 10px;
    padding: 4px 8px;
    margin-bottom: 16px;
  }
  .chap-rail .level-tag small {
    display: block; font-family: "JetBrains Mono";
    font-size: 8px; opacity: 0.7; margin-top: 2px;
  }
  .chap {
    position: relative;
    padding: 10px 12px 10px 32px;
    cursor: pointer;
    border-left: 3px solid var(--asphalt-4);
    margin-left: 14px;
    color: var(--cream-2);
    user-select: none;
  }
  .chap::before {
    content: "";
    position: absolute; left: -10px; top: 14px;
    width: 16px; height: 16px;
    background: var(--asphalt-3);
    border: 3px solid var(--asphalt-4);
    border-radius: 50%;
    z-index: 1;
  }
  .chap.done::before { background: var(--signal-green); border-color: var(--signal-green); }
  .chap.done::after {
    content: ""; position: absolute; left: -3px; top: 17px;
    width: 7px; height: 4px; border: 2px solid var(--ink);
    border-top: 0; border-right: 0; transform: rotate(-45deg);
  }
  .chap.current::before {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.25);
    animation: bigpulse 1.6s infinite;
  }
  @keyframes bigpulse { 50% { box-shadow: 0 0 0 8px rgba(255, 204, 0, 0.05); } }
  .chap.quiz::before {
    background: var(--signal-red); border-color: var(--signal-red);
    border-radius: 0;
    clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%);
  }
  .chap.attestation::before, .chap.aupread::before {
    background: var(--signal-red); border-color: var(--signal-red);
    border-radius: 2px;
  }
  .chap.redteam::before, .chap.riskregister::before, .chap.prepbuilder::before {
    background: var(--accent); border-color: var(--accent);
    border-radius: 0;
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  }
  .chap.locked { opacity: 0.5; cursor: not-allowed; }
  .chap.current { background: var(--asphalt-3); color: var(--cream); }
  .chap b { font-family: "Bungee"; font-size: 12px; display: block; line-height: 1.1; margin-bottom: 3px; }
  .chap small { font-family: "JetBrains Mono"; font-size: 9px; color: var(--cream-3); }
  .chap .dur { float: right; font-family: "JetBrains Mono"; font-size: 9px; color: var(--muted); }

  /* ============ MAIN STAGE ============ */
  .windshield {
    background: var(--cream);
    color: var(--ink);
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .windshield::before {
    content: ""; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(20,20,15,0.04) 0 1px, transparent 1px 40px),
      repeating-linear-gradient(90deg, rgba(20,20,15,0.04) 0 1px, transparent 1px 40px);
    pointer-events: none;
  }

  .stage-head {
    padding: 22px 40px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 24px;
    position: relative; z-index: 2;
  }
  .seg-eyebrow {
    display: inline-block;
    background: var(--ink); color: var(--accent);
    font-family: "Bungee"; font-size: 11px;
    padding: 4px 10px;
    margin-bottom: 10px;
  }
  .seg-eyebrow.quiz { background: var(--signal-red); color: var(--cream); }
  .seg-eyebrow.demo { background: var(--signal-green); color: var(--ink); }
  .seg-eyebrow.reflect { background: var(--sky); color: var(--ink); }
  .seg-eyebrow.attestation, .seg-eyebrow.aupread { background: var(--signal-red); color: var(--cream); }
  .seg-eyebrow.redteam { background: var(--ink); color: var(--signal-red); }
  .seg-eyebrow.riskregister, .seg-eyebrow.prepbuilder { background: var(--accent); color: var(--accent-ink); }

  .seg-title {
    font-family: "Bungee"; font-size: 32px; line-height: 0.95; margin: 0;
  }
  .seg-meta {
    font-family: "JetBrains Mono"; font-size: 11px;
    text-align: right;
    color: var(--muted);
  }
  .seg-meta b { font-family: "Bungee"; font-size: 14px; color: var(--ink); display: block; }

  .stage-body {
    flex: 1;
    padding: 22px 40px 84px;
    position: relative; z-index: 2;
    overflow-y: auto;
    min-height: 0;
  }

  /* ---- CONCEPT SLIDE TEMPLATE ---- */
  .concept {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 32px;
    align-items: start;
  }
  .big-sign-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 0 0;
  }
  .big-sign {
    width: 220px; height: 220px;
    background: var(--signal-red); color: var(--cream);
    border: 6px solid var(--ink);
    display: grid; place-items: center;
    font-family: "Bungee"; font-size: 24px;
    text-align: center;
    box-shadow: 10px 10px 0 var(--ink);
    line-height: 1;
    position: relative;
    padding: 12px;
  }
  .big-sign.octagon { clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%); }
  .big-sign.no-entry { border-radius: 50%; }
  .big-sign.no-entry::after {
    content: ""; position: absolute;
    left: 14%; right: 14%; top: 46%; height: 14px;
    background: var(--cream);
  }
  .big-sign.no-entry span { display: none; }
  .big-sign.rect { background: var(--signal-green); color: var(--cream); }
  .big-sign.circle { border-radius: 50%; background: var(--cream); color: var(--ink); border-color: var(--signal-red); border-width: 14px; font-size: 72px; }
  .big-sign.triangle {
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
    background: var(--sign-yellow); color: var(--ink);
    padding-top: 80px; align-items: end;
    box-shadow: 10px 10px 0 var(--ink);
  }
  .big-sign.diamond {
    transform: rotate(45deg);
    width: 180px; height: 180px;
    background: var(--sign-yellow); color: var(--ink);
    margin: 20px auto;
  }
  .big-sign.diamond > span { transform: rotate(-45deg); display: block; }

  .sign-post {
    width: 12px; height: 70px;
    background: linear-gradient(180deg, #c8c0a8 0%, #8a8268 100%);
    border-radius: 0 0 4px 4px;
    margin-top: -2px;
  }

  .concept-body h3 {
    font-family: "Bungee"; font-size: 22px;
    margin: 0 0 6px;
  }
  .concept-body .sub {
    font-family: "JetBrains Mono"; font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }
  .concept-body p {
    font-size: 15px; line-height: 1.55;
    margin: 0 0 14px;
  }
  .concept-body p strong {
    background: var(--accent); padding: 0 4px;
  }
  .examples {
    background: #fff; border: 3px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
    padding: 18px;
    margin-top: 14px;
  }
  .examples h5 {
    font-family: "Bungee"; font-size: 13px;
    margin: 0 0 10px;
  }
  .examples ul { margin: 0; padding-left: 20px; font-size: 13.5px; line-height: 1.55; }
  .examples li { padding: 2px 0; }
  .examples li.bad { text-decoration: line-through; color: var(--muted); }
  .examples li.bad::marker { content: "✗ "; }
  .examples li.good::marker { content: "✓ "; }
  .examples li.good { color: var(--signal-green); font-weight: 600; }

  .callout {
    display: grid; grid-template-columns: 60px 1fr;
    gap: 14px; align-items: center;
    background: var(--asphalt); color: var(--cream);
    border: 3px solid var(--ink);
    padding: 14px 18px;
    margin-top: 14px;
  }
  .callout .ic {
    width: 50px; height: 50px;
    background: var(--accent);
    border: 3px solid var(--ink);
    display: grid; place-items: center;
    font-family: "Bungee"; font-size: 22px; color: var(--accent-ink);
  }
  .callout .ic.red { background: var(--signal-red); color: var(--cream); }
  .callout b { font-family: "Bungee"; font-size: 13px; display: block; margin-bottom: 2px; color: var(--accent); }
  .callout p { margin: 0; font-size: 13px; line-height: 1.5; color: var(--cream-2); }

  /* ---- QUIZ SLIDE ---- */
  .quiz-block { max-width: 760px; margin: 0 auto; }
  .quiz-q {
    font-family: "Bungee"; font-size: 20px;
    line-height: 1.25;
    margin: 0 0 22px;
  }
  .quiz-q strong { background: var(--accent); padding: 0 4px; }
  .quiz-opts { display: grid; gap: 10px; }
  .quiz-opt {
    background: #fff; border: 3px solid var(--ink);
    padding: 14px 16px;
    cursor: pointer;
    display: grid; grid-template-columns: 36px 1fr 24px; gap: 14px; align-items: center;
    font-size: 14.5px;
    box-shadow: 4px 4px 0 var(--ink);
    user-select: none;
    transition: transform .1s;
  }
  .quiz-opt:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .quiz-opt .letter {
    width: 36px; height: 36px;
    background: var(--cream-2); border: 2px solid var(--ink);
    display: grid; place-items: center;
    font-family: "Bungee"; font-size: 14px;
  }
  .quiz-opt.selected { background: var(--accent); }
  .quiz-opt.right { background: var(--signal-green); }
  .quiz-opt.right .letter { background: var(--ink); color: var(--signal-green); }
  .quiz-opt.wrong { background: var(--signal-red); color: var(--cream); }
  .quiz-opt.wrong .letter { background: var(--ink); color: var(--signal-red); }
  .quiz-opt .mark { font-family: "Bungee"; font-size: 18px; }
  .quiz-feedback {
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--asphalt); color: var(--cream);
    border: 3px solid var(--ink);
    font-size: 13.5px; line-height: 1.55;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback b { font-family: "Bungee"; display: block; margin-bottom: 4px; color: var(--accent); font-size: 13px; }
  .quiz-feedback.right b { color: var(--signal-green); }
  .quiz-feedback.wrong b { color: var(--signal-red); }

  /* ---- PREP BUILDER (Level 1) ---- */
  .prep-builder { max-width: 880px; }
  .prep-scenario {
    background: var(--ink); color: var(--cream);
    border: 3px solid var(--ink);
    padding: 16px 20px;
    margin-bottom: 18px;
  }
  .prep-scenario b { font-family: "Bungee"; color: var(--accent); display: block; margin-bottom: 4px; font-size: 11px; }
  .prep-scenario p { margin: 0; font-size: 14px; line-height: 1.5; }

  .prep-fields { display: grid; gap: 12px; }
  .prep-field {
    background: #fff; border: 3px solid var(--ink);
    padding: 12px 14px; display: grid; gap: 8px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .prep-field-head {
    display: flex; align-items: center; gap: 12px;
  }
  .prep-letter {
    width: 36px; height: 36px;
    background: var(--accent); color: var(--accent-ink);
    border: 2px solid var(--ink);
    display: grid; place-items: center;
    font-family: "Bungee"; font-size: 18px;
    flex: 0 0 36px;
  }
  .prep-field-head b { font-family: "Bungee"; font-size: 14px; }
  .prep-field-head small { font-family: "JetBrains Mono"; font-size: 10px; color: var(--muted); margin-left: auto; }
  .prep-field-head .check {
    width: 22px; height: 22px;
    border: 2px solid var(--ink);
    display: grid; place-items: center;
    font-family: "Bungee"; font-size: 14px;
    background: var(--cream-2);
  }
  .prep-field-head .check.ok { background: var(--signal-green); color: var(--cream); }
  .prep-field textarea {
    width: 100%; min-height: 60px;
    border: 2px solid var(--cream-3);
    background: var(--cream);
    padding: 10px 12px;
    font-family: "Space Grotesk"; font-size: 14px;
    resize: vertical;
    color: var(--ink);
  }
  .prep-field textarea:focus { outline: none; border-color: var(--ink); background: #fff; }
  .prep-status {
    margin-top: 14px;
    background: var(--asphalt); color: var(--cream);
    border: 3px solid var(--ink);
    padding: 12px 16px;
    font-family: "JetBrains Mono"; font-size: 12px;
    display: flex; align-items: center; gap: 14px;
  }
  .prep-status .pct { font-family: "Bungee"; font-size: 22px; color: var(--accent); }
  .prep-status .msg { flex: 1; }

  /* ---- AUP READ (Level 2) ---- */
  .aup-wrap { max-width: 920px; }
  .aup-meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    background: var(--ink); color: var(--cream);
    padding: 14px 16px; margin-bottom: 14px;
    font-family: "JetBrains Mono"; font-size: 10px;
    border: 3px solid var(--ink);
  }
  .aup-meta .k { color: var(--cream-3); }
  .aup-meta .v { font-family: "Bungee"; font-size: 12px; color: var(--accent); display: block; }
  .aup-scroll-meta {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 10px;
    font-family: "JetBrains Mono"; font-size: 11px;
  }
  .aup-scroll-meta .gauge {
    flex: 1; height: 12px;
    background: var(--cream-2); border: 2px solid var(--ink);
    position: relative; overflow: hidden;
  }
  .aup-scroll-meta .gauge i {
    display: block; height: 100%;
    background: var(--signal-red); width: 0;
    transition: width .15s;
  }
  .aup-scroll-meta .gauge.done i { background: var(--signal-green); }
  .aup-scroll-meta b { font-family: "Bungee"; font-size: 13px; }
  .aup-scroll-meta .lock {
    background: var(--signal-red); color: var(--cream);
    padding: 4px 10px; font-family: "Bungee"; font-size: 11px;
  }
  .aup-scroll-meta .lock.unlocked { background: var(--signal-green); color: var(--ink); }

  .aup-doc {
    background: #fff; border: 3px solid var(--ink);
    height: 320px; overflow-y: auto;
    padding: 22px 28px;
    box-shadow: 6px 6px 0 var(--ink);
    line-height: 1.6; font-size: 13.5px;
    counter-reset: section;
  }
  .aup-doc h4 {
    font-family: "Bungee"; font-size: 18px;
    margin: 0 0 4px;
  }
  .aup-doc .doc-meta {
    font-family: "JetBrains Mono"; font-size: 10px;
    color: var(--muted); margin-bottom: 18px;
    border-bottom: 2px solid var(--cream-3); padding-bottom: 14px;
  }
  .aup-doc h5 {
    font-family: "Bungee"; font-size: 13px;
    margin: 20px 0 8px;
    counter-increment: section;
  }
  .aup-doc h5::before {
    content: "§" counter(section) " · ";
    color: var(--signal-red);
  }
  .aup-doc p { margin: 6px 0; }
  .aup-doc ul { padding-left: 22px; margin: 8px 0; }
  .aup-doc li { padding: 2px 0; }
  .aup-doc .prohibited {
    background: rgba(226, 58, 46, 0.08);
    border-left: 4px solid var(--signal-red);
    padding: 8px 12px; margin: 6px 0;
    font-family: "JetBrains Mono"; font-size: 12px;
  }
  .aup-doc .signed-end {
    margin-top: 22px; padding-top: 14px;
    border-top: 2px solid var(--ink);
    font-family: "JetBrains Mono"; font-size: 11px;
    color: var(--muted);
  }

  /* ---- ATTESTATION (Level 2) ---- */
  .attest-wrap { max-width: 760px; }
  .attest-card {
    background: #fff; border: 3px solid var(--ink);
    box-shadow: 10px 10px 0 var(--signal-red);
    padding: 0; overflow: hidden;
  }
  .attest-head {
    background: var(--ink); color: var(--cream);
    padding: 16px 22px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .attest-head b { font-family: "Bungee"; font-size: 16px; color: var(--accent); }
  .attest-head .stamp {
    background: var(--signal-red); color: var(--cream);
    font-family: "Bungee"; font-size: 11px;
    padding: 4px 10px; border: 2px solid var(--cream);
    transform: rotate(-3deg);
  }
  .attest-body { padding: 22px 24px; }
  .attest-body p { font-size: 14px; line-height: 1.55; margin: 0 0 14px; }
  .attest-body .clauses {
    background: var(--cream-2);
    border: 2px dashed var(--ink);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .attest-body .clauses li { padding: 3px 0; font-size: 13px; }

  .sig-row { display: grid; grid-template-columns: 1fr 200px; gap: 14px; align-items: end; margin-bottom: 14px; }
  .sig-field label { font-family: "JetBrains Mono"; font-size: 10px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 4px; }
  .sig-field input {
    width: 100%; height: 44px;
    border: 3px solid var(--ink);
    background: var(--cream-2); padding: 0 14px;
    font-family: "Bungee"; font-size: 16px; color: var(--ink);
  }
  .sig-field input:focus { outline: none; background: var(--accent); }
  .sig-field input.sig-handwriting {
    font-family: "Bungee"; font-style: italic;
    background: #fff;
  }
  .sig-field .ts-display {
    background: var(--asphalt); color: var(--cream);
    padding: 12px 14px;
    font-family: "JetBrains Mono"; font-size: 11px;
    border: 3px solid var(--ink);
    line-height: 1.4;
  }
  .sig-field .ts-display b { font-family: "Bungee"; font-size: 12px; color: var(--accent); display: block; }

  .attest-confirm {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px;
    border: 3px solid var(--ink);
    background: var(--cream-2);
    margin-bottom: 14px;
    cursor: pointer; user-select: none;
  }
  .attest-confirm input { width: 24px; height: 24px; accent-color: var(--signal-green); margin-top: 2px; }
  .attest-confirm.disabled { opacity: 0.5; cursor: not-allowed; }
  .attest-confirm strong { display: block; font-family: "Bungee"; font-size: 12px; margin-bottom: 3px; }
  .attest-confirm p { margin: 0; font-size: 13px; line-height: 1.45; }

  .attest-cta {
    display: flex; gap: 12px; align-items: center;
  }
  .attest-cta .btn-signed {
    background: var(--signal-red); color: var(--cream);
    border: 3px solid var(--ink);
    padding: 14px 24px;
    font-family: "Bungee"; font-size: 14px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .attest-cta .btn-signed:disabled { background: var(--cream-3); color: var(--muted); cursor: not-allowed; box-shadow: none; }
  .attest-cta .btn-signed.signed { background: var(--signal-green); color: var(--ink); }
  .attest-cta .receipt {
    font-family: "JetBrains Mono"; font-size: 11px;
    color: var(--muted);
  }
  .attest-cta .receipt b { font-family: "Bungee"; color: var(--ink); }

  .attest-receipt-card {
    background: var(--asphalt); color: var(--cream);
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--signal-green);
    margin-top: 18px;
    display: none;
  }
  .attest-receipt-card.show { display: block; }
  .attest-receipt-card .rhead {
    background: var(--signal-green); color: var(--ink);
    padding: 10px 16px;
    font-family: "Bungee"; font-size: 13px;
    display: flex; justify-content: space-between;
  }
  .attest-receipt-card .rbody {
    padding: 16px 18px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    font-family: "JetBrains Mono"; font-size: 11px;
  }
