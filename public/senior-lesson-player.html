document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"22654299-6fa0-4024-97e1-6f66ee7d7bfe\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --cream: #f5ecd2;\n    --cream-2: #f0e3bd;\n    --cream-3: #e6d8a8;\n    --asphalt: #14140f;\n    --asphalt-2: #1f1e16;\n    --asphalt-3: #2a2820;\n    --asphalt-4: #3a3528;\n    --sign-yellow: #ffcc00;\n    --sign-amber: #ff9d00;\n    --signal-red: #e23a2e;\n    --signal-green: #2ec866;\n    --sky: #6fb3e0;\n    --ink: #14140f;\n    --muted: #6a624a;\n    --line: #d8c98f;\n    --line-white: #f6f1de;\n\n    /* Per-level accent (overridden via body.level-X) */\n    --accent: #ffcc00;\n    --accent-ink: #14140f;\n  }\n  body.level-L { --accent: #6fb3e0; --accent-ink: #14140f; }\n  body.level-C { --accent: #e23a2e; --accent-ink: #f5ecd2; }\n  body.level-A { --accent: #ffcc00; --accent-ink: #14140f; }\n\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    background: var(--asphalt);\n    color: var(--cream);\n    font-family: \"Space Grotesk\", system-ui, sans-serif;\n    height: 100vh; overflow: hidden;\n  }\n  body {\n    display: grid;\n    grid-template-rows: 6px 64px 1fr 200px;\n    height: 100vh;\n  }\n  .mono { font-family: \"JetBrains Mono\", monospace; }\n\n  /* Top accent strip — level signature */\n  .level-strip { background: var(--accent); }\n\n  /* ============ TOP BAR ============ */\n  .topbar {\n    background: var(--asphalt-2);\n    border-bottom: 3px solid var(--ink);\n    display: flex; align-items: center;\n    padding: 0 24px;\n    gap: 20px;\n    color: var(--cream);\n  }\n  .back {\n    display: flex; align-items: center; gap: 10px;\n    height: 40px; padding: 0 14px;\n    background: transparent; border: 2px solid var(--cream-3);\n    color: var(--cream);\n    font-family: \"Bungee\"; font-size: 11px;\n    text-decoration: none;\n    cursor: pointer;\n  }\n  .back:hover { background: var(--asphalt-3); }\n\n  .lesson-title { font-family: \"Bungee\"; font-size: 14px; line-height: 1.1; max-width: 360px; }\n  .lesson-title small { display: block; font-family: \"JetBrains Mono\"; font-size: 9px; color: var(--cream-3); font-weight: 400; margin-top: 4px; letter-spacing: 0.04em; }\n\n  /* Level switcher */\n  .level-switch {\n    display: flex; gap: 0;\n    border: 2px solid var(--asphalt-4);\n    height: 40px;\n  }\n  .level-switch button {\n    background: var(--asphalt);\n    color: var(--cream-2);\n    border: 0; border-right: 2px solid var(--asphalt-4);\n    padding: 0 14px;\n    font-family: \"Bungee\"; font-size: 11px;\n    cursor: pointer;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .level-switch button:last-child { border-right: 0; }\n  .level-switch button:hover { background: var(--asphalt-3); }\n  .level-switch button.active { background: var(--accent); color: var(--accent-ink); }\n  .level-switch button .badge {\n    width: 18px; height: 18px;\n    border: 2px solid currentColor;\n    border-radius: 50%;\n    display: grid; place-items: center;\n    font-family: \"Bungee\"; font-size: 10px;\n  }\n  .level-switch button.active .badge { border-color: currentColor; }\n\n  .top-progress {\n    flex: 1; max-width: 240px;\n    display: flex; align-items: center; gap: 12px;\n    font-family: \"JetBrains Mono\"; font-size: 11px;\n  }\n  .top-progress .bar { flex: 1; height: 10px; background: var(--asphalt-3); border: 2px solid var(--cream-3); position: relative; }\n  .top-progress .bar i { display: block; height: 100%; background: var(--accent); width: 24%; transition: width .3s; }\n\n  .top-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }\n  .pill {\n    height: 36px; display: inline-flex; align-items: center; gap: 8px;\n    padding: 0 12px; border: 2px solid var(--asphalt-4);\n    background: var(--asphalt); color: var(--cream-2);\n    font-family: \"JetBrains Mono\"; font-size: 11px;\n  }\n  .pill b { font-family: \"Bungee\"; font-size: 11px; color: var(--accent); }\n  .pill .live { width: 8px; height: 8px; border-radius: 50%; background: var(--signal-green); animation: pulse 1.5s infinite; }\n  @keyframes pulse { 50% { opacity: 0.3; } }\n\n  .icon-btn {\n    width: 40px; height: 40px;\n    border: 2px solid var(--asphalt-4); background: var(--asphalt);\n    color: var(--cream-2); cursor: pointer;\n    display: grid; place-items: center;\n  }\n  .icon-btn:hover { background: var(--asphalt-3); border-color: var(--cream-3); }\n\n  /* ============ STAGE LAYOUT ============ */\n  .stage {\n    display: grid;\n    grid-template-columns: 260px 1fr 340px;\n    overflow: hidden;\n    min-height: 0;\n  }\n\n  /* ============ LEFT RAIL — CHAPTERS ============ */\n  .chap-rail {\n    background: var(--asphalt-2);\n    border-right: 3px solid var(--ink);\n    overflow-y: auto;\n    padding: 20px 16px;\n  }\n  .chap-rail h4 {\n    font-family: \"Bungee\"; font-size: 11px;\n    color: var(--accent);\n    margin: 0 0 14px;\n    letter-spacing: 0.06em;\n  }\n  .chap-rail .level-tag {\n    display: inline-block;\n    background: var(--accent); color: var(--accent-ink);\n    font-family: \"Bungee\"; font-size: 10px;\n    padding: 4px 8px;\n    margin-bottom: 16px;\n  }\n  .chap-rail .level-tag small {\n    display: block; font-family: \"JetBrains Mono\";\n    font-size: 8px; opacity: 0.7; margin-top: 2px;\n  }\n  .chap {\n    position: relative;\n    padding: 10px 12px 10px 32px;\n    cursor: pointer;\n    border-left: 3px solid var(--asphalt-4);\n    margin-left: 14px;\n    color: var(--cream-2);\n    user-select: none;\n  }\n  .chap::before {\n    content: \"\";\n    position: absolute; left: -10px; top: 14px;\n    width: 16px; height: 16px;\n    background: var(--asphalt-3);\n    border: 3px solid var(--asphalt-4);\n    border-radius: 50%;\n    z-index: 1;\n  }\n  .chap.done::before { background: var(--signal-green); border-color: var(--signal-green); }\n  .chap.done::after {\n    content: \"\"; position: absolute; left: -3px; top: 17px;\n    width: 7px; height: 4px; border: 2px solid var(--ink);\n    border-top: 0; border-right: 0; transform: rotate(-45deg);\n  }\n  .chap.current::before {\n    background: var(--accent); border-color: var(--accent);\n    box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.25);\n    animation: bigpulse 1.6s infinite;\n  }\n  @keyframes bigpulse { 50% { box-shadow: 0 0 0 8px rgba(255, 204, 0, 0.05); } }\n  .chap.quiz::before {\n    background: var(--signal-red); border-color: var(--signal-red);\n    border-radius: 0;\n    clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%);\n  }\n  .chap.attestation::before, .chap.aupread::before {\n    background: var(--signal-red); border-color: var(--signal-red);\n    border-radius: 2px;\n  }\n  .chap.redteam::before, .chap.riskregister::before, .chap.prepbuilder::before {\n    background: var(--accent); border-color: var(--accent);\n    border-radius: 0;\n    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);\n  }\n  .chap.locked { opacity: 0.5; cursor: not-allowed; }\n  .chap.current { background: var(--asphalt-3); color: var(--cream); }\n  .chap b { font-family: \"Bungee\"; font-size: 12px; display: block; line-height: 1.1; margin-bottom: 3px; }\n  .chap small { font-family: \"JetBrains Mono\"; font-size: 9px; color: var(--cream-3); }\n  .chap .dur { float: right; font-family: \"JetBrains Mono\"; font-size: 9px; color: var(--muted); }\n\n  /* ============ MAIN STAGE ============ */\n  .windshield {\n    background: var(--cream);\n    color: var(--ink);\n    overflow: hidden;\n    position: relative;\n    display: flex; flex-direction: column;\n  }\n  .windshield::before {\n    content: \"\"; position: absolute; inset: 0;\n    background:\n      repeating-linear-gradient(0deg, rgba(20,20,15,0.04) 0 1px, transparent 1px 40px),\n      repeating-linear-gradient(90deg, rgba(20,20,15,0.04) 0 1px, transparent 1px 40px);\n    pointer-events: none;\n  }\n\n  .stage-head {\n    padding: 22px 40px 0;\n    display: flex; justify-content: space-between; align-items: flex-start;\n    gap: 24px;\n    position: relative; z-index: 2;\n  }\n  .seg-eyebrow {\n    display: inline-block;\n    background: var(--ink); color: var(--accent);\n    font-family: \"Bungee\"; font-size: 11px;\n    padding: 4px 10px;\n    margin-bottom: 10px;\n  }\n  .seg-eyebrow.quiz { background: var(--signal-red); color: var(--cream); }\n  .seg-eyebrow.demo { background: var(--signal-green); color: var(--ink); }\n  .seg-eyebrow.reflect { background: var(--sky); color: var(--ink); }\n  .seg-eyebrow.attestation, .seg-eyebrow.aupread { background: var(--signal-red); color: var(--cream); }\n  .seg-eyebrow.redteam { background: var(--ink); color: var(--signal-red); }\n  .seg-eyebrow.riskregister, .seg-eyebrow.prepbuilder { background: var(--accent); color: var(--accent-ink); }\n\n  .seg-title {\n    font-family: \"Bungee\"; font-size: 32px; line-height: 0.95; margin: 0;\n  }\n  .seg-meta {\n    font-family: \"JetBrains Mono\"; font-size: 11px;\n    text-align: right;\n    color: var(--muted);\n  }\n  .seg-meta b { font-family: \"Bungee\"; font-size: 14px; color: var(--ink); display: block; }\n\n  .stage-body {\n    flex: 1;\n    padding: 22px 40px 84px;\n    position: relative; z-index: 2;\n    overflow-y: auto;\n    min-height: 0;\n  }\n\n  /* ---- CONCEPT SLIDE TEMPLATE ---- */\n  .concept {\n    display: grid;\n    grid-template-columns: 260px 1fr;\n    gap: 32px;\n    align-items: start;\n  }\n  .big-sign-wrap {\n    display: flex; flex-direction: column; align-items: center;\n    padding: 16px 0 0;\n  }\n  .big-sign {\n    width: 220px; height: 220px;\n    background: var(--signal-red); color: var(--cream);\n    border: 6px solid var(--ink);\n    display: grid; place-items: center;\n    font-family: \"Bungee\"; font-size: 24px;\n    text-align: center;\n    box-shadow: 10px 10px 0 var(--ink);\n    line-height: 1;\n    position: relative;\n    padding: 12px;\n  }\n  .big-sign.octagon { clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%); }\n  .big-sign.no-entry { border-radius: 50%; }\n  .big-sign.no-entry::after {\n    content: \"\"; position: absolute;\n    left: 14%; right: 14%; top: 46%; height: 14px;\n    background: var(--cream);\n  }\n  .big-sign.no-entry span { display: none; }\n  .big-sign.rect { background: var(--signal-green); color: var(--cream); }\n  .big-sign.circle { border-radius: 50%; background: var(--cream); color: var(--ink); border-color: var(--signal-red); border-width: 14px; font-size: 72px; }\n  .big-sign.triangle {\n    clip-path: polygon(50% 0, 100% 100%, 0 100%);\n    background: var(--sign-yellow); color: var(--ink);\n    padding-top: 80px; align-items: end;\n    box-shadow: 10px 10px 0 var(--ink);\n  }\n  .big-sign.diamond {\n    transform: rotate(45deg);\n    width: 180px; height: 180px;\n    background: var(--sign-yellow); color: var(--ink);\n    margin: 20px auto;\n  }\n  .big-sign.diamond > span { transform: rotate(-45deg); display: block; }\n\n  .sign-post {\n    width: 12px; height: 70px;\n    background: linear-gradient(180deg, #c8c0a8 0%, #8a8268 100%);\n    border-radius: 0 0 4px 4px;\n    margin-top: -2px;\n  }\n\n  .concept-body h3 {\n    font-family: \"Bungee\"; font-size: 22px;\n    margin: 0 0 6px;\n  }\n  .concept-body .sub {\n    font-family: \"JetBrains Mono\"; font-size: 11px;\n    color: var(--muted);\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    margin-bottom: 14px;\n  }\n  .concept-body p {\n    font-size: 15px; line-height: 1.55;\n    margin: 0 0 14px;\n  }\n  .concept-body p strong {\n    background: var(--accent); padding: 0 4px;\n  }\n  .examples {\n    background: #fff; border: 3px solid var(--ink);\n    box-shadow: 5px 5px 0 var(--ink);\n    padding: 18px;\n    margin-top: 14px;\n  }\n  .examples h5 {\n    font-family: \"Bungee\"; font-size: 13px;\n    margin: 0 0 10px;\n  }\n  .examples ul { margin: 0; padding-left: 20px; font-size: 13.5px; line-height: 1.55; }\n  .examples li { padding: 2px 0; }\n  .examples li.bad { text-decoration: line-through; color: var(--muted); }\n  .examples li.bad::marker { content: \"✗ \"; }\n  .examples li.good::marker { content: \"✓ \"; }\n  .examples li.good { color: var(--signal-green); font-weight: 600; }\n\n  .callout {\n    display: grid; grid-template-columns: 60px 1fr;\n    gap: 14px; align-items: center;\n    background: var(--asphalt); color: var(--cream);\n    border: 3px solid var(--ink);\n    padding: 14px 18px;\n    margin-top: 14px;\n  }\n  .callout .ic {\n    width: 50px; height: 50px;\n    background: var(--accent);\n    border: 3px solid var(--ink);\n    display: grid; place-items: center;\n    font-family: \"Bungee\"; font-size: 22px; color: var(--accent-ink);\n  }\n  .callout .ic.red { background: var(--signal-red); color: var(--cream); }\n  .callout b { font-family: \"Bungee\"; font-size: 13px; display: block; margin-bottom: 2px; color: var(--accent); }\n  .callout p { margin: 0; font-size: 13px; line-height: 1.5; color: var(--cream-2); }\n\n  /* ---- QUIZ SLIDE ---- */\n  .quiz-block { max-width: 760px; margin: 0 auto; }\n  .quiz-q {\n    font-family: \"Bungee\"; font-size: 20px;\n    line-height: 1.25;\n    margin: 0 0 22px;\n  }\n  .quiz-q strong { background: var(--accent); padding: 0 4px; }\n  .quiz-opts { display: grid; gap: 10px; }\n  .quiz-opt {\n    background: #fff; border: 3px solid var(--ink);\n    padding: 14px 16px;\n    cursor: pointer;\n    display: grid; grid-template-columns: 36px 1fr 24px; gap: 14px; align-items: center;\n    font-size: 14.5px;\n    box-shadow: 4px 4px 0 var(--ink);\n    user-select: none;\n    transition: transform .1s;\n  }\n  .quiz-opt:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }\n  .quiz-opt .letter {\n    width: 36px; height: 36px;\n    background: var(--cream-2); border: 2px solid var(--ink);\n    display: grid; place-items: center;\n    font-family: \"Bungee\"; font-size: 14px;\n  }\n  .quiz-opt.selected { background: var(--accent); }\n  .quiz-opt.right { background: var(--signal-green); }\n  .quiz-opt.right .letter { background: var(--ink); color: var(--signal-green); }\n  .quiz-opt.wrong { background: var(--signal-red); color: var(--cream); }\n  .quiz-opt.wrong .letter { background: var(--ink); color: var(--signal-red); }\n  .quiz-opt .mark { font-family: \"Bungee\"; font-size: 18px; }\n  .quiz-feedback {\n    margin-top: 18px;\n    padding: 16px 18px;\n    background: var(--asphalt); color: var(--cream);\n    border: 3px solid var(--ink);\n    font-size: 13.5px; line-height: 1.55;\n    display: none;\n  }\n  .quiz-feedback.show { display: block; }\n  .quiz-feedback b { font-family: \"Bungee\"; display: block; margin-bottom: 4px; color: var(--accent); font-size: 13px; }\n  .quiz-feedback.right b { color: var(--signal-green); }\n  .quiz-feedback.wrong b { color: var(--signal-red); }\n\n  /* ---- PREP BUILDER (Level 1) ---- */\n  .prep-builder { max-width: 880px; }\n  .prep-scenario {\n    background: var(--ink); color: var(--cream);\n    border: 3px solid var(--ink);\n    padding: 16px 20px;\n    margin-bottom: 18px;\n  }\n  .prep-scenario b { font-family: \"Bungee\"; color: var(--accent); display: block; margin-bottom: 4px; font-size: 11px; }\n  .prep-scenario p { margin: 0; font-size: 14px; line-height: 1.5; }\n\n  .prep-fields { display: grid; gap: 12px; }\n  .prep-field {\n    background: #fff; border: 3px solid var(--ink);\n    padding: 12px 14px; display: grid; gap: 8px;\n    box-shadow: 4px 4px 0 var(--ink);\n  }\n  .prep-field-head {\n    display: flex; align-items: center; gap: 12px;\n  }\n  .prep-letter {\n    width: 36px; height: 36px;\n    background: var(--accent
