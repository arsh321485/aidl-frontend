<style>
  :root {
    --cream: #f5ecd2;
    --cream-2: #f0e3bd;
    --cream-3: #e6d8a8;
    --asphalt: #14140f;
    --asphalt-2: #1f1e16;
    --asphalt-3: #2a2820;
    --asphalt-4: #3a3528;
    --sign-yellow: #ffcc00;
    --sign-amber: #ff9d00;
    --signal-red: #e23a2e;
    --signal-green: #2ec866;
    --sky: #6fb3e0;
    --ink: #14140f;
    --muted: #6a624a;
    --line: #d8c98f;
    --line-white: #f6f1de;
    --accent: #2ec866;
    --accent-ink: #14140f;
  }
  body.level-J { --accent: #2ec866; --accent-ink: #14140f; }
  body.level-T { --accent: #6fb3e0; --accent-ink: #14140f; }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--asphalt);
    color: var(--cream);
    font-family: "Space Grotesk", system-ui, sans-serif;
    height: 100vh; overflow: hidden;
  }
  body { display: grid; grid-template-rows: 8px 66px 1fr 200px; height: 100vh; }
  .mono { font-family: "JetBrains Mono", monospace; }

  .level-strip { background: var(--accent); }

  /* ============ TOP BAR ============ */
  .topbar { background: var(--asphalt-2); border-bottom: 3px solid var(--ink); display: flex; align-items: center; padding: 0 22px; gap: 18px; }
  .back { display: flex; align-items: center; gap: 9px; height: 40px; padding: 0 14px; background: transparent; border: 2px solid var(--cream-3); color: var(--cream); font-family: "Bungee"; font-size: 11px; text-decoration: none; cursor: pointer; }
  .back:hover { background: var(--asphalt-3); }
  .lesson-title { font-family: "Bungee"; font-size: 14px; line-height: 1.1; max-width: 320px; }
  .lesson-title small { display: block; font-family: "JetBrains Mono"; font-size: 9px; color: var(--cream-3); font-weight: 400; margin-top: 4px; letter-spacing: 0.03em; }

  .level-switch { display: flex; border: 2px solid var(--asphalt-4); height: 40px; }
  .level-switch button { background: var(--asphalt); color: var(--cream-2); border: 0; border-right: 2px solid var(--asphalt-4); padding: 0 16px; font-family: "Bungee"; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .level-switch button:last-child { border-right: 0; }
  .level-switch button:hover { background: var(--asphalt-3); }
  .level-switch button.active { background: var(--accent); color: var(--accent-ink); }
  .level-switch button .badge { width: 20px; height: 20px; border: 2px solid currentColor; border-radius: 50%; display: grid; place-items: center; font-family: "Bungee"; font-size: 10px; }

  .top-progress { flex: 1; max-width: 220px; display: flex; align-items: center; gap: 12px; font-family: "JetBrains Mono"; font-size: 11px; }
  .top-progress .bar { flex: 1; height: 12px; background: var(--asphalt-3); border: 2px solid var(--cream-3); position: relative; border-radius: 8px; overflow: hidden; }
  .top-progress .bar i { display: block; height: 100%; background: var(--accent); width: 0%; transition: width .3s; }

  .top-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .pill { height: 38px; display: inline-flex; align-items: center; gap: 8px; padding: 0 14px; border: 2px solid var(--asphalt-4); background: var(--asphalt); color: var(--cream-2); font-family: "JetBrains Mono"; font-size: 11px; }
  .pill b { font-family: "Bungee"; font-size: 11px; color: var(--accent); }
  .pill.stars b { font-size: 15px; letter-spacing: 2px; }
  .pill .live { width: 8px; height: 8px; border-radius: 50%; background: var(--signal-green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .icon-btn { width: 40px; height: 40px; border: 2px solid var(--asphalt-4); background: var(--asphalt); color: var(--cream-2); cursor: pointer; display: grid; place-items: center; }
  .icon-btn:hover { background: var(--asphalt-3); border-color: var(--cream-3); }

  /* ============ STAGE ============ */
  .stage { display: grid; grid-template-columns: 258px 1fr 330px; overflow: hidden; min-height: 0; }

  /* LEFT — STOPS */
  .chap-rail { background: var(--asphalt-2); border-right: 3px solid var(--ink); overflow-y: auto; padding: 20px 16px; }
  .chap-rail h4 { font-family: "Bungee"; font-size: 11px; color: var(--accent); margin: 0 0 14px; letter-spacing: 0.05em; }
  .level-tag { display: inline-block; background: var(--accent); color: var(--accent-ink); font-family: "Bungee"; font-size: 10px; padding: 5px 9px; margin-bottom: 16px; border-radius: 6px; }
  .level-tag small { display: block; font-family: "JetBrains Mono"; font-size: 8px; opacity: 0.75; margin-top: 3px; }
  .chap { position: relative; padding: 10px 12px 10px 32px; cursor: pointer; border-left: 3px solid var(--asphalt-4); margin-left: 14px; color: var(--cream-2); user-select: none; }
  .chap::before { content: ""; position: absolute; left: -10px; top: 14px; width: 16px; height: 16px; background: var(--asphalt-3); border: 3px solid var(--asphalt-4); border-radius: 50%; z-index: 1; }
  .chap.done::before { background: var(--signal-green); border-color: var(--signal-green); }
  .chap.done::after { content: ""; position: absolute; left: -3px; top: 17px; width: 7px; height: 4px; border: 2px solid var(--ink); border-top: 0; border-right: 0; transform: rotate(-45deg); }
  .chap.current::before { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(46,200,102,0.25); animation: bigpulse 1.6s infinite; }
  @keyframes bigpulse { 50% { box-shadow: 0 0 0 8px rgba(46,200,102,0.05); } }
  .chap.jrquiz::before { background: var(--signal-red); border-color: var(--signal-red); border-radius: 0; clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%); }
  .chap.jrbuilder::before, .chap.jrsort::before { background: var(--accent); border-color: var(--accent); border-radius: 0; clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }
  .chap.current { background: var(--asphalt-3); color: var(--cream); }
  .chap b { font-family: "Bungee"; font-size: 12px; display: block; line-height: 1.1; margin-bottom: 3px; }
  .chap small { font-family: "JetBrains Mono"; font-size: 9px; color: var(--cream-3); }
  .chap .dur { float: right; font-family: "JetBrains Mono"; font-size: 9px; color: var(--muted); }

  /* MAIN — WINDSHIELD */
  .windshield { background: var(--cream); color: var(--ink); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .windshield::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(20,20,15,0.04) 0 1px, transparent 1px 40px), repeating-linear-gradient(90deg, rgba(20,20,15,0.04) 0 1px, transparent 1px 40px); pointer-events: none; }
  .stage-head { padding: 22px 40px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; position: relative; z-index: 2; }
  .seg-eyebrow { display: inline-block; background: var(--ink); color: var(--accent); font-family: "Bungee"; font-size: 11px; padding: 5px 11px; margin-bottom: 10px; border-radius: 5px; }
  .seg-eyebrow.jrquiz { background: var(--signal-red); color: var(--cream); }
  .seg-eyebrow.jrbuilder { background: var(--accent); color: var(--accent-ink); }
  .seg-eyebrow.jrsort { background: var(--sign-amber); color: var(--ink); }
  .seg-eyebrow.reflect { background: var(--signal-green); color: var(--ink); }
  .seg-title { font-family: "Bungee"; font-size: 32px; line-height: 0.95; margin: 0; }
  .seg-meta { font-family: "JetBrains Mono"; font-size: 11px; text-align: right; color: var(--muted); }
  .seg-meta b { font-family: "Bungee"; font-size: 14px; color: var(--ink); display: block; }
  .stage-body { flex: 1; padding: 22px 40px 84px; position: relative; z-index: 2; overflow-y: auto; min-height: 0; }

  /* CONCEPT */
  .concept { display: grid; grid-template-columns: 250px 1fr; gap: 34px; align-items: start; }
  .big-sign-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px 0 0; }
  .big-sign { width: 210px; height: 210px; background: var(--signal-red); color: var(--cream); border: 6px solid var(--ink); display: grid; place-items: center; font-family: "Bungee"; font-size: 22px; text-align: center; box-shadow: 10px 10px 0 var(--ink); line-height: 1.05; position: relative; padding: 14px; }
  .big-sign.octagon { clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%); }
  .big-sign.rect { background: var(--signal-green); color: var(--cream); border-radius: 10px; }
  .big-sign.circle { border-radius: 50%; background: var(--signal-green); color: var(--cream); font-size: 60px; }
  body.level-T .big-sign.circle { background: var(--sky); color: var(--ink); }
  body.level-T .big-sign.rect { background: var(--sky); color: var(--ink); }
  .big-sign.triangle { clip-path: polygon(50% 0, 100% 100%, 0 100%); background: var(--sign-yellow); color: var(--ink); padding-top: 78px; align-items: end; box-shadow: 10px 10px 0 var(--ink); font-size: 17px; }
  .sign-post { width: 12px; height: 70px; background: linear-gradient(180deg, #c8c0a8 0%, #8a8268 100%); border-radius: 0 0 4px 4px; margin-top: -2px; }

  .concept-body h3 { font-family: "Baloo 2", "Bungee", sans-serif; font-weight: 800; font-size: 30px; margin: 0 0 6px; line-height: 1.05; }
  .concept-body .sub { font-family: "JetBrains Mono"; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
  .concept-body p { font-size: 16px; line-height: 1.6; margin: 0 0 14px; }
  .concept-body p strong { background: var(--accent); padding: 0 4px; border-radius: 3px; }
  .examples { background: #fff; border: 3px solid var(--ink); box-shadow: 5px 5px 0 var(--ink); padding: 18px; margin-top: 14px; border-radius: 8px; }
  .examples h5 { font-family: "Bungee"; font-size: 13px; margin: 0 0 10px; }
  .examples ul { margin: 0; padding-left: 24px; font-size: 14.5px; line-height: 1.6; }
  .examples li { padding: 3px 0; }
  .examples li.bad { color: var(--muted); }
  .examples li.bad::marker { content: "✗ "; }
  .examples li.good::marker { content: "✓ "; }
  .examples li.good { color: #1f8a5b; font-weight: 600; }

  .callout { display: grid; grid-template-columns: 60px 1fr; gap: 14px; align-items: center; background: var(--asphalt); color: var(--cream); border: 3px solid var(--ink); padding: 16px 18px; margin-top: 16px; border-radius: 8px; }
  .callout .ic { width: 50px; height: 50px; background: var(--accent); border: 3px solid var(--ink); display: grid; place-items: center; font-family: "Bungee"; font-size: 22px; color: var(--accent-ink); border-radius: 50%; }
  .callout .ic.red { background: var(--signal-red); color: var(--cream); }
  .callout b { font-family: "Bungee"; font-size: 13px; display: block; margin-bottom: 2px; color: var(--accent); }
  .callout p { margin: 0; font-size: 14px; line-height: 1.5; color: var(--cream-2); }

  /* QUIZ */
  .quiz-block { max-width: 780px; margin: 0 auto; }
  .quiz-tag { display: inline-block; background: var(--signal-red); color: var(--cream); font-family: "Bungee"; font-size: 11px; padding: 5px 11px; border-radius: 5px; margin-bottom: 16px; }
  .quiz-q { font-family: "Baloo 2", sans-serif; font-weight: 700; font-size: 23px; line-height: 1.3; margin: 0 0 22px; }
  .quiz-q strong { background: var(--accent); padding: 0 4px; border-radius: 3px; }
  .quiz-opts { display: grid; gap: 12px; }
  .quiz-opt { background: #fff; border: 3px solid var(--ink); padding: 15px 16px; cursor: pointer; display: grid; grid-template-columns: 40px 1fr 26px; gap: 14px; align-items: center; font-size: 15.5px; box-shadow: 4px 4px 0 var(--ink); user-select: none; transition: transform .1s; border-radius: 10px; }
  .quiz-opt:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .quiz-opt .letter { width: 40px; height: 40px; background: var(--cream-2); border: 2px solid var(--ink); display: grid; place-items: center; font-family: "Bungee"; font-size: 15px; border-radius: 50%; }
  .quiz-opt.selected { background: var(--accent); }
  .quiz-opt.right { background: var(--signal-green); }
  .quiz-opt.right .letter { background: var(--ink); color: var(--signal-green); }
  .quiz-opt.wrong { background: var(--signal-red); color: var(--cream); }
  .quiz-opt.wrong .letter { background: var(--ink); color: var(--signal-red); }
  .quiz-opt .mark { font-family: "Bungee"; font-size: 20px; }
  .quiz-feedback { margin-top: 18px; padding: 16px 18px; background: var(--asphalt); color: var(--cream); border: 3px solid var(--ink); font-size: 14.5px; line-height: 1.6; display: none; border-radius: 8px; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback b { font-family: "Bungee"; display: block; margin-bottom: 6px; color: var(--accent); font-size: 13px; }
  .quiz-feedback.right b { color: var(--signal-green); }
  .quiz-feedback.wrong b { color: var(--sign-amber); }

  /* BUILDER */
  .prep-builder { max-width: 880px; }
  .prep-scenario { background: var(--ink); color: var(--cream); border: 3px solid var(--ink); padding: 16px 20px; margin-bottom: 18px; border-radius: 8px; }
  .prep-scenario b { font-family: "Bungee"; color: var(--accent); display: block; margin-bottom: 4px; font-size: 11px; }
  .prep-scenario p { margin: 0; font-size: 15px; line-height: 1.5; }
  .prep-fields { display: grid; gap: 12px; }
  .prep-field { background: #fff; border: 3px solid var(--ink); padding: 14px 16px; display: grid; gap: 8px; box-shadow: 4px 4px 0 var(--ink); border-radius: 10px; }
  .prep-field-head { display: flex; align-items: center; gap: 12px; }
  .prep-letter { width: 40px; height: 40px; background: var(--accent); color: var(--accent-ink); border: 2px solid var(--ink); display: grid; place-items: center; font-family: "Bungee"; font-size: 18px; flex: 0 0 40px; border-radius: 50%; }
  .prep-field-head b { font-family: "Bungee"; font-size: 15px; }
  .prep-field-head small { font-family: "JetBrains Mono"; font-size: 10px; color: var(--muted); margin-left: auto; }
  .prep-field-head .check { width: 26px; height: 26px; border: 2px solid var(--ink); display: grid; place-items: center; font-family: "Bungee"; font-size: 15px; background: var(--cream-2); border-radius: 50%; }
  .prep-field-head .check.ok { background: var(--signal-green); color: var(--cream); }
  .prep-field textarea { width: 100%; min-height: 58px; border: 2px solid var(--cream-3); background: var(--cream); padding: 10px 12px; font-family: "Space Grotesk"; font-size: 15px; resize: vertical; color: var(--ink); border-radius: 6px; }
  .prep-field textarea:focus { outline: none; border-color: var(--ink); background: #fff; }
  .prep-status { margin-top: 14px; background: var(--asphalt); color: var(--cream); border: 3px solid var(--ink); padding: 14px 16px; font-family: "JetBrains Mono"; font-size: 13px; display: flex; align-items: center; gap: 14px; border-radius: 8px; }
  .prep-status .pct { font-family: "Bungee"; font-size: 24px; color: var(--accent); }
  .prep-status .msg { flex: 1; }

  /* SORT GAME */
  .sort-wrap { max-width: 1000px; }
  .sort-intro { font-size: 15.5px; line-height: 1.5; margin-bottom: 18px; }
